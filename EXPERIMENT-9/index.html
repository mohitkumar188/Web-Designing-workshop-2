<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green-dark:   #2d5a27;
      --green-mid:    #3d7a34;
      --green-light:  #5aab4e;
      --green-pale:   #eaf5e8;
      --white:        #ffffff;
      --gray-100:     #f4f6f4;
      --gray-300:     #c8d4c7;
      --gray-500:     #7a917a;
      --gray-700:     #3d4d3d;
      --text-main:    #1e301e;
      --shadow:       0 20px 60px rgba(45,90,39,0.15);
      --radius:       14px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-100);
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(90,171,78,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(45,90,39,0.10) 0%, transparent 60%);
      font-family: 'DM Sans', sans-serif;
      padding: 1.5rem;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.8rem 2.4rem 2.4rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--green-dark), var(--green-light));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 2rem;
    }

    .card-header .icon {
      width: 32px;
      height: 32px;
      background: var(--green-pale);
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .card-header .icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--green-dark);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 4vw, 1.6rem);
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .field {
      margin-bottom: 1.1rem;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 0.38rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      border: 1.5px solid var(--gray-300);
      border-radius: 9px;
      padding: 0.72rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text-main);
      background: var(--gray-100);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: var(--gray-500);
      font-weight: 300;
    }

    input:focus {
      border-color: var(--green-mid);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(61,122,52,0.12);
    }

    input.error {
      border-color: #d9534f;
      background: #fff8f8;
    }

    .error-msg {
      font-size: 0.75rem;
      color: #d9534f;
      margin-top: 0.3rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* Password toggle */
    .pw-wrap { position: relative; }

    .pw-toggle {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--gray-500);
      display: grid;
      place-items: center;
    }

    .pw-toggle svg { width: 18px; height: 18px; stroke: currentColor; }
    .pw-toggle:hover { color: var(--green-mid); }

    .pw-wrap input { padding-right: 2.6rem; }

    /* Strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 0.45rem;
      height: 4px;
    }

    .strength-bar span {
      flex: 1;
      border-radius: 99px;
      background: var(--gray-300);
      transition: background 0.35s;
    }

    .strength-bar.s1 span:nth-child(1)               { background: #d9534f; }
    .strength-bar.s2 span:nth-child(-n+2)             { background: #f0ad4e; }
    .strength-bar.s3 span:nth-child(-n+3)             { background: #5aab4e; }
    .strength-bar.s4 span                             { background: #2d5a27; }

    .strength-hint {
      font-size: 0.72rem;
      color: var(--gray-500);
      margin-top: 0.2rem;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 0.82rem;
      border: none;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      margin-top: 0.6rem;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(45,90,39,0.30);
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn:hover::after { background: rgba(255,255,255,0.08); }
    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading spinner inside button */
    .btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-text { opacity: 0.7; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success state */
    .success-msg {
      display: none;
      text-align: center;
      padding: 1.2rem 0 0.5rem;
      animation: fadeIn 0.4s ease both;
    }

    .success-msg.visible { display: block; }

    .success-msg .check {
      width: 52px; height: 52px;
      background: var(--green-pale);
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 0.85rem;
    }

    .success-msg .check svg {
      width: 26px; height: 26px;
      stroke: var(--green-dark);
    }

    .success-msg p {
      font-size: 0.95rem;
      color: var(--gray-700);
    }

    .success-msg strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--text-main);
      margin-bottom: 0.3rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--gray-300);
      margin: 1.6rem 0 1.2rem;
    }

    .login-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--gray-500);
    }

    .login-link a {
      color: var(--green-dark);
      font-weight: 500;
      text-decoration: none;
    }

    .login-link a:hover { text-decoration: underline; }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.4rem 1.8rem;
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>

<div class="card" id="card">

  <div class="card-header">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <h1>Registration Form</h1>
  </div>

  <div id="formArea">
    <!-- Name -->
    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter Name" autocomplete="name"/>
      <span class="error-msg" id="nameErr">Please enter your name.</span>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter Email" autocomplete="email"/>
      <span class="error-msg" id="emailErr">Please enter a valid email.</span>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter Password" autocomplete="new-password"/>
        <button class="pw-toggle" type="button" id="toggle" aria-label="Toggle password visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar" id="strengthBar">
        <span></span><span></span><span></span><span></span>
      </div>
      <p class="strength-hint" id="strengthHint"></p>
      <span class="error-msg" id="pwErr">Password must be at least 6 characters.</span>
    </div>

    <button class="btn" id="registerBtn" type="button">
      <span class="spinner"></span>
      <span class="btn-text">Register</span>
    </button>

    <hr class="divider"/>
    <p class="login-link">Already have an account? <a href="#">Sign in</a></p>
  </div>

  <!-- Success Message -->
  <div class="success-msg" id="successMsg">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <strong>You're registered!</strong>
    <p>Welcome aboard. Your account has been created successfully.</p>
  </div>

</div>

<script>
  const nameInput  = document.getElementById('name');
  const emailInput = document.getElementById('email');
  const pwInput    = document.getElementById('password');
  const toggle     = document.getElementById('toggle');
  const eyeIcon    = document.getElementById('eyeIcon');
  const btn        = document.getElementById('registerBtn');
  const bar        = document.getElementById('strengthBar');
  const hint       = document.getElementById('strengthHint');
  const nameErr    = document.getElementById('nameErr');
  const emailErr   = document.getElementById('emailErr');
  const pwErr      = document.getElementById('pwErr');
  const formArea   = document.getElementById('formArea');
  const successMsg = document.getElementById('successMsg');

  /* --- Password visibility toggle --- */
  toggle.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  });

  /* --- Password strength --- */
  const levels = [
    { label: '', cls: '' },
    { label: 'Weak',      cls: 's1' },
    { label: 'Fair',      cls: 's2' },
    { label: 'Good',      cls: 's3' },
    { label: 'Strong 💪', cls: 's4' },
  ];

  function getStrength(pw) {
    if (!pw) return 0;
    let s = 0;
    if (pw.length >= 6)  s++;
    if (pw.length >= 10) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) s++;
    return s;
  }

  pwInput.addEventListener('input', () => {
    const s = getStrength(pwInput.value);
    bar.className = 'strength-bar ' + (levels[s]?.cls || '');
    hint.textContent = pwInput.value ? levels[s]?.label : '';
  });

  /* --- Validation helpers --- */
  function showErr(input, errEl, msg) {
    input.classList.add('error');
    errEl.textContent = msg;
    errEl.classList.add('visible');
  }

  function clearErr(input, errEl) {
    input.classList.remove('error');
    errEl.classList.remove('visible');
  }

  nameInput.addEventListener('input',  () => clearErr(nameInput,  nameErr));
  emailInput.addEventListener('input', () => clearErr(emailInput, emailErr));
  pwInput.addEventListener('input',    () => clearErr(pwInput,    pwErr));

  function validate() {
    let ok = true;
    if (!nameInput.value.trim()) {
      showErr(nameInput, nameErr, 'Please enter your name.');
      ok = false;
    }
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(emailInput.value.trim())) {
      showErr(emailInput, emailErr, 'Please enter a valid email.');
      ok = false;
    }
    if (pwInput.value.length < 6) {
      showErr(pwInput, pwErr, 'Password must be at least 6 characters.');
      ok = false;
    }
    return ok;
  }

  /* --- Submit --- */
  btn.addEventListener('click', () => {
    if (!validate()) return;

    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      btn.classList.remove('loading');
      formArea.style.display = 'none';
      successMsg.classList.add('visible');
    }, 1600);
  });

  /* --- Enter key support --- */
  [nameInput, emailInput, pwInput].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  });
</script>
</body>
</html>
